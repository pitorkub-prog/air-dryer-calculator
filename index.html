<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAISHAN | AI Compressor & Dryer Sizing</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy: #0b1d3a;
            --gold: #f5a623;
            --dark-gold: #d48e1a;
            --slate: #f4f7fa;
            --text-dark: #1a2b48;
            --white: #ffffff;
            --success: #27ae60;
        }

        body {
            font-family: 'Prompt', sans-serif;
            background-color: var(--slate);
            color: var(--text-dark);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: var(--white);
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
            border-top: 6px solid var(--navy);
        }

        .header {
            background: var(--navy);
            color: var(--white);
            padding: 25px;
            text-align: center;
        }

        .header h1 { margin: 0; font-size: 22px; color: var(--gold); }

        /* Type Selector Buttons */
        .type-selector {
            display: flex;
            background: #eee;
            padding: 10px;
            gap: 10px;
            justify-content: center;
        }

        .type-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Prompt';
            font-weight: 600;
            transition: 0.3s;
            background: #ddd;
            color: #666;
        }

        .type-btn.active {
            background: var(--navy);
            color: var(--white);
        }

        .type-btn.active.gold-mode {
            background: var(--gold);
            color: var(--navy);
        }

        .config-section {
            padding: 25px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            border-bottom: 1px solid #eee;
        }

        .input-group { display: flex; flex-direction: column; }
        .input-group label { font-size: 12px; font-weight: 600; margin-bottom: 5px; color: var(--navy); }
        .input-group input, .input-group select { padding: 10px; border: 1px solid #ccd6e0; border-radius: 6px; font-family: 'Prompt'; }

        .result-section { padding: 30px; background: #f9fbff; }
        
        /* Recommendation Cards */
        .grid-results {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 25px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #e0e6ed;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .card h4 { margin: 0 0 10px 0; font-size: 14px; color: #7f8c8d; text-transform: uppercase; }
        .card .model-name { font-size: 24px; font-weight: 700; color: var(--navy); display: block; margin: 5px 0; }
        .card .cap-info { font-size: 13px; color: var(--success); font-weight: 600; }

        .total-dryer {
            grid-column: span 2;
            background: var(--navy);
            color: white;
            padding: 20px;
            border-radius: 10px;
        }

        .total-dryer h4 { color: var(--gold); }
        .total-dryer .value { font-size: 36px; font-weight: 700; }

        .btn-print {
            width: 100%;
            background: var(--gold);
            color: var(--navy);
            border: none;
            padding: 15px;
            font-family: 'Prompt';
            font-weight: 700;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
        }

        @media (max-width: 600px) {
            .grid-results { grid-template-columns: 1fr; }
            .total-dryer { grid-column: span 1; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>KAISHAN SYSTEM SELECTOR</h1>
    </div>

    <div class="type-selector">
        <button class="type-btn active" id="btn-fix" onclick="setType('fix')">FIX SPEED (KRSD)</button>
        <button class="type-btn" id="btn-inv" onclick="setType('inv')">INVERTER (PMV)</button>
    </div>

    <div class="config-section">
        <div class="input-group">
            <label>Required Air Flow (m³/min)</label>
            <input type="number" id="flow" value="10.0" step="0.1" oninput="calculate()">
        </div>
        <div class="input-group">
            <label>Working Pressure (bar)</label>
            <select id="pressure" onchange="calculate()">
                <option value="0.75">5 bar</option>
                <option value="1.0" selected>7-8 bar</option>
                <option value="1.25">10 bar</option>
            </select>
        </div>
        <div class="input-group">
            <label>Ambient Temp (°C)</label>
            <select id="ambientTemp" onchange="calculate()">
                <option value="1.0" selected>35°C</option>
                <option value="0.75">50°C</option>
            </select>
        </div>
    </div>

    <div class="result-section">
        <div class="grid-results">
            <div class="card">
                <h4 id="comp-title">Recommended Compressor</h4>
                <span class="model-name" id="res-comp-model">-</span>
                <span class="cap-info" id="res-comp-cap">Capacity: - m³/min</span>
            </div>

            <div class="card">
                <h4>Required Dryer Size</h4>
                <span class="model-name" id="res-dryer-val">0.00</span>
                <span class="cap-info">Nm³/min (Min. Req)</span>
            </div>

            <div class="total-dryer">
                <h4>ENGINEERING SUMMARY</h4>
                <div style="display:flex; justify-content: space-between; align-items: center;">
                    <div>
                        <div class="value" id="res-final-dryer">12.00</div>
                        <div style="font-size:12px; opacity:0.8;">Suggested Dryer Capacity (SF 1.2)</div>
                    </div>
                    <div style="text-align: right; font-size:14px;">
                        Status: <span style="color:var(--gold)">Ready to Order</span><br>
                        Standard: ISO 7183
                    </div>
                </div>
            </div>
        </div>

        <button class="btn-print" onclick="window.print()">GENERATE TECHNICAL DATA SHEET</button>
    </div>
</div>

<script>
// Database Compressor
const KRSD_DATA = [
    { m: "KRSD-18", c: 3.3 }, { m: "KRSD-22", c: 3.8 }, { m: "KRSD-30", c: 5.7 },
    { m: "KRSD-37", c: 6.8 }, { m: "KRSD-55", c: 10.0 }, { m: "KRSD-75", c: 14.0 },
    { m: "KRSD-90", c: 17.0 }, { m: "KRSD-110", c: 21.2 }, { m: "KRSD-132", c: 24.0 },
    { m: "KRSD-160", c: 28.5 }, { m: "KRSD-200", c: 36.8 }, { m: "KRSD-250", c: 45.0 },
    { m: "KRSD-315", c: 55.2 }, { m: "KRSD-355", c: 64.0 }
];

const PMV_DATA = [
    { m: "PMVFQ15", c: 2.88 }, { m: "PMVFQ22", c: 4.22 }, { m: "PMVFQ37", c: 7.42 },
    { m: "PMVFQ45", c: 9.27 }, { m: "PMVFQ55", c: 11.95 }, { m: "PMVFQ75-II", c: 16.5 },
    { m: "PMVFQ90-II", c: 21.7 }, { m: "PMVFQ110-II", c: 25.7 }, { m: "PMVFQ132-II", c: 33.6 },
    { m: "PMVFQ160-II", c: 39.5 }, { m: "PMVFQ185-II", c: 43.5 }, { m: "PMVFQ200-II", c: 47.4 },
    { m: "PMVFQ250-II", c: 59.3 }
];

let currentType = 'fix';

function setType(type) {
    currentType = type;
    document.getElementById('btn-fix').classList.toggle('active', type === 'fix');
    document.getElementById('btn-inv').classList.toggle('active', type === 'inv');
    document.getElementById('comp-title').textContent = type === 'fix' ? "Fix Speed (KRSD)" : "Inverter (PMV)";
    calculate();
}

function calculate() {
    const inputFlow = parseFloat(document.getElementById('flow').value) || 0;
    const cp = parseFloat(document.getElementById('pressure').value);
    const ca = parseFloat(document.getElementById('ambientTemp').value);
    
    // 1. Auto Select Compressor
    const db = currentType === 'fix' ? KRSD_DATA : PMV_DATA;
    let selectedComp = db.find(item => item.c >= inputFlow);
    if (!selectedComp) selectedComp = { m: "Consult Factory", c: 0 };

    document.getElementById('res-comp-model').textContent = selectedComp.m;
    document.getElementById('res-comp-cap').textContent = `Capacity: ${selectedComp.c} m³/min`;

    // 2. Air Dryer Sizing Logic
    const beta = cp * ca; // Simplified factor
    const qDryerMin = inputFlow / beta;
    const qDryerFinal = qDryerMin * 1.2; // Safety Factor 1.2

    document.getElementById('res-dryer-val').textContent = qDryerMin.toFixed(2);
    document.getElementById('res-final-dryer').textContent = qDryerFinal.toFixed(2);
}

calculate();
</script>
</body>
</html>
